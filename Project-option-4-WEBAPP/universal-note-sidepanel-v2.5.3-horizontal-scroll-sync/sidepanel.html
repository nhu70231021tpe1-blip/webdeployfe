<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Universal Note</title><link rel="stylesheet" href="sidepanel.css" /></head>
<body><div class="app"><header class="header"><div><div class="title">Universal Note</div><div class="subtitle">V2.5.3: marker chạy theo kéo ngang scrollbar</div></div><span id="contextKind" class="chip">General</span></header><section class="context-box"><div><strong>Nguồn lưu:</strong> <span id="contextLabel">...</span></div><div id="pendingHint" class="pending-hint"></div></section><section class="scope-box"><button id="scopeGlobal" class="scope-btn">Global</button><button id="scopePage" class="scope-btn">Theo page</button><button id="scopeExternal" class="scope-btn">Theo externalId</button></section><section class="actions"></section><section id="settingsBox" class="settings-box"><div class="setting-row"><label>Hotkey đơn</label><input id="singleHotkeyDisplay" type="text" readonly /><button id="captureSingle" class="btn secondary small">Đổi</button><button id="clearSingle" class="btn danger small">Tắt</button></div><div class="setting-row"><label>Hotkey range</label><input id="rangeHotkeyDisplay" type="text" readonly /><button id="captureRange" class="btn secondary small">Đổi</button><button id="clearRange" class="btn danger small">Tắt</button></div><div class="settings-help">Đã map marker theo viewport của scrollbar handle ngang: kéo handle sang đâu, marker/text sẽ dịch theo đúng cửa sổ nhìn thấy. Label vẫn là time + text. Click mark để đổi màu.</div></section><section class="note-panel"><div class="subhead">Note chính</div><textarea id="note" placeholder="Tất cả note sẽ gom về đây..."></textarea></section><footer class="footer"><span id="status">Sẵn sàng</span></footer></div><script src="sidepanel.js"></script></body></html>
