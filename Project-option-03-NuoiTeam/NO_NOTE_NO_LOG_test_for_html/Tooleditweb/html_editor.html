<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB EDITOR</title>

    <!-- Load from Local folder -->
    <link href="../ToolMoi/bootstrap.min.css" rel="stylesheet">
    <script src="tinymce/tinymce.min.js"></script>
    <script src="../ToolMoi/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background-color: #f4f6f9;
            padding-bottom: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 15px 0;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .editor-container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }

        #file-name-display {
            font-weight: 600;
            color: #0d6efd;
            background-color: #e9ecef;
            padding: 5px 12px;
            border-radius: 6px;
        }

        .tox-tinymce {
            border-radius: 6px !important;
        }
    </style>
</head>

<body>
    <div class="header text-center">
        <h3 class="mb-0 fw-bold">WEB EDITOR </h4>
    </div>

    <div class="container-fluid px-4">
        <!-- Control Panel -->
        <div class="row mb-3 align-items-center">
            <div class="col-md-6 d-flex align-items-center gap-2">
                <input type="file" id="import-btn" accept=".html,.htm" class="d-none">
                <button class="btn btn-outline-primary shadow-sm d-flex align-items-center"
                    onclick="document.getElementById('import-btn').click()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-folder2-open me-2" viewBox="0 0 16 16">
                        <path
                            d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0 1 15 5.5v.64c.57.265.94.876.856 1.546l-.64 5.124A2.5 2.5 0 0 1 12.733 15H3.266a2.5 2.5 0 0 1-2.481-2.19l-.64-5.124A1.5 1.5 0 0 1 1 6.14V3.5zM2 6h12v-.5a.5.5 0 0 0-.5-.5H9c-.964 0-1.71-.629-2.174-1.154C6.374 3.334 5.82 3 5.264 3H2.5a.5.5 0 0 0-.5.5V6zm-.367 1a.5.5 0 0 0-.496.562l.64 5.124A1.5 1.5 0 0 0 3.266 14h9.468a1.5 1.5 0 0 0 1.489-1.314l.64-5.124A.5.5 0 0 0 14.367 7H1.633z" />
                    </svg> Nhập File Có Sẵn (.html)
                </button>
                <button class="btn btn-outline-secondary shadow-sm d-flex align-items-center" onclick="createNew()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-file-earmark-plus me-2" viewBox="0 0 16 16">
                        <path
                            d="M8 6.5a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5V11a.5.5 0 0 1-1 0V9.5H6a.5.5 0 0 1 0-1h1.5V7a.5.5 0 0 1 .5-.5z" />
                        <path
                            d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z" />
                    </svg> Xóa & Tạo Mới
                </button>
            </div>
            <div class="col-md-6 text-end d-flex justify-content-end align-items-center gap-3">
                <span id="file-name-display">Trạng thái: Trăng trắng mới</span>
                <button class="btn btn-primary px-4 shadow-sm d-flex align-items-center" onclick="exportHTML()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-floppy me-2" viewBox="0 0 16 16">
                        <path d="M11 2H9v3h2V2Z" />
                        <path
                            d="M1.5 0h11.586a1.5 1.5 0 0 1 1.06.44l1.415 1.414A1.5 1.5 0 0 1 16 2.914V14.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13A1.5 1.5 0 0 1 1.5 0ZM1 1.5v13a.5.5 0 0 0 .5.5H2v-4.5A1.5 1.5 0 0 1 3.5 9h9a1.5 1.5 0 0 1 1.5 1.5V15h.5a.5.5 0 0 0 .5-.5V2.914a.5.5 0 0 0-.146-.353l-1.415-1.415A.5.5 0 0 0 13.086 1H13v4.5A1.5 1.5 0 0 1 11.5 7h-7A1.5 1.5 0 0 1 3 5.5V1H1.5a.5.5 0 0 0-.5.5Zm3 4a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V1H4v4.5ZM3 15h10v-4.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5V15Z" />
                    </svg> Tải Về / Lưu Code
                </button>
            </div>
        </div>

        <!-- Editor Area -->
        <div class="editor-container">
            <textarea id="my-editor" style="height: 80vh;"></textarea>
        </div>
    </div>

    <!-- Hướng dẫn sử dụng nhỏ -->
    <div class="container-fluid px-4 mt-3 text-muted text-center" style="font-size: 13px;">
        Tool được làm và sử dụng cho mục đính chỉnh sủa web phòng DVKH vui lòng không share hoặc chỉnh sửa cấu trúc bên
        trong.
    </div>

    <!-- UI: Toast Notification (Alert xịn) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="liveToast" class="toast align-items-center text-white bg-success border-0 shadow-lg" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toast-message" style="font-size: 14px;">
                    Thông báo!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- UI: Custom Confirm Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true" style="z-index: 1100;">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content shadow-lg border-0" style="border-radius: 12px;">
                <div class="modal-body text-center p-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="#dc3545"
                        class="bi bi-exclamation-circle mb-3" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                        <path
                            d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z" />
                    </svg>
                    <h5 class="fw-bold text-dark mb-3">Xác nhận</h5>
                    <p id="confirm-message" class="text-muted mb-4">Bạn có chắc chắn không?</p>
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="button" class="btn btn-danger px-4" id="confirm-btn">Đồng ý</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Các hàm giao diện dùng chung
        function showNotification(message, type = 'success') {
            const toastEl = document.getElementById('liveToast');
            document.getElementById('toast-message').innerText = message;
            toastEl.className = `toast align-items-center text-white bg-${type} border-0 shadow-lg`;
            const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
            toast.show();
        }

        function showConfirm(message, onConfirm) {
            document.getElementById('confirm-message').innerText = message;
            const modalEl = document.getElementById('confirmModal');
            const confirmModal = new bootstrap.Modal(modalEl);
            const confirmBtn = document.getElementById('confirm-btn');
            // Clone để reset Event Listener cũ
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);

            newBtn.addEventListener('click', function () {
                confirmModal.hide();
                onConfirm();
            });
            confirmModal.show();
        }

        // Lưu trữ các tag head (css, config) của file hiện tại để bê y nguyên sang khi export.
        let originalHead = `
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLTT</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; line-height: 1.6; }
    </style>`;

        let currentFileName = "web_moi_cua_ban.html";

        let popupDepth = 0; // Quản lý số lớp tạo popup đệ quy

        window.launchPopupEditor = function (initialContent, callback) {
            popupDepth++;
            const editorId = 'popup-editor-' + Date.now();
            const modalId = 'modal-' + editorId;
            const zIndexClass = 1050 + (popupDepth * 10);

            // 1. Tạo động Modal DOM để hỗ trợ mở Popup chồng lên Popup
            const modalHTML = `
            <div class="modal fade" id="${modalId}" tabindex="-1" aria-hidden="true" style="z-index: ${zIndexClass};">
              <div class="modal-dialog modal-dialog-centered" style="max-width: 80%;">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title fw-bold text-primary">Soạn thảo Popup (Lớp ${popupDepth})</h5>
                    <button type="button" class="btn-close" onclick="closePopupModal('${modalId}', '${editorId}')"></button>
                  </div>
                  <div class="modal-body p-0">
                    <textarea id="${editorId}"></textarea>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closePopupModal('${modalId}', '${editorId}')">Hủy</button>
                    <button type="button" class="btn btn-primary" onclick="savePopupModal('${modalId}', '${editorId}')">Lưu Popup</button>
                  </div>
                </div>
              </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            // Xóa / Lưu Callback an toàn
            window['cb_' + editorId] = callback;

            // 2. Khởi tạo chức năng cho trình TinyMCE nội bộ popup (Bao gồm CẢ nút CreatePopup)
            tinymce.init({
                selector: '#' + editorId,
                base_url: './tinymce',
                suffix: '.min',
                license_key: 'gpl',
                promotion: false,
                branding: false,
                height: 550,
                menubar: false,
                plugins: 'lists link image media table code preview emoticons',
                toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline | forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist | link image media createpopup createaccordion | code',
                content_style: `
                    body { font-family: -apple-system, system-ui, sans-serif; font-size: 15px; margin: 10px; }
                    .accordion { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: #fff; }
                    .accordion-item { border-bottom: 1px solid #e5e7eb; }
                    .accordion-header { background: #f8fafc; margin: 0; padding: 0; }
                    .accordion-button { display: block; width: 100%; border: none; background: transparent; padding: 16px 20px; text-align: left; font-weight: bold; color: #0d6efd; font-size: 16px; cursor: pointer; text-decoration: none; }
                    .accordion-button:hover { background: #f1f5f9; }
                    .accordion-collapse { display: block !important; padding: 16px 20px; background: #fff; border-top: 1px solid #e5e7eb; color: #4b5563; }
                `,
                setup: function (editor) {
                    editor.ui.registry.addButton('createaccordion', {
                        icon: 'chevron-down',
                        tooltip: 'Chèn Accordion (Mở/Thu gọn)',
                        onAction: () => {
                            const uniqueId = 'accordion-' + Date.now();
                            const item1Id = 'heading-' + Date.now() + '-1';
                            const collapse1Id = 'collapse-' + Date.now() + '-1';

                            const html = `
                                <div class="accordion rounded-3 shadow-sm mb-4 border" id="${uniqueId}">
                                  <div class="accordion-item border-0">
                                    <h2 class="accordion-header m-0" id="${item1Id}">
                                      <button class="accordion-button bg-light fw-bold text-primary p-3 w-100 text-start collapsed" style="border: none;" type="button" data-bs-toggle="collapse" data-bs-target="#${collapse1Id}" aria-expanded="false" aria-controls="${collapse1Id}">
                                        <span style="margin-right: 8px; font-size: 18px;"></span> Tiêu đề mục 1 (Bấm vào tôi)
                                      </button>
                                    </h2>
                                    <div id="${collapse1Id}" class="accordion-collapse collapse border-top" aria-labelledby="${item1Id}" data-bs-parent="#${uniqueId}">
                                      <div class="accordion-body p-3">
                                        <p class="text-muted m-0">Nhập nội dung chi tiết vào đây...</p>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                                <p>&nbsp;</p>
                            `;
                            editor.insertContent(html);
                        }
                    });

                    editor.ui.registry.addButton('createpopup', {
                        icon: 'comment',
                        tooltip: 'Tạo Popup (Bôi đen text)',
                        onAction: () => {
                            const selectedText = editor.selection.getContent({ format: 'text' });
                            if (!selectedText) { showNotification('Vui lòng bôi đen một nội dung chữ trước khi tạo popup!', 'warning'); return; }
                            if (window.launchPopupEditor) {
                                window.launchPopupEditor('', (popupHtml) => {
                                    if (!editor) return;
                                    editor.focus();
                                    try {
                                        const safeVal = encodeURIComponent(popupHtml);
                                        const html = `<span class="custom-popup" data-popup-content="${safeVal}" title="Click xem chi tiết" style="color: blue; text-decoration: underline; cursor: pointer;">${selectedText}</span>`;
                                        editor.insertContent(html);
                                    } catch (e) { }
                                });
                            }
                        }
                    });

                    // Edit popup đệ quy
                    editor.on('click', (e) => {
                        const target = e.target;
                        if (target.nodeName === 'SPAN' && target.classList.contains('custom-popup')) {
                            const oldVal = target.getAttribute('data-popup-content') || '';
                            try { var decoded = decodeURIComponent(oldVal); } catch (e) { var decoded = oldVal; }
                            window.launchPopupEditor(decoded, (newHtml) => {
                                editor.focus();
                                try { editor.dom.setAttrib(target, 'data-popup-content', encodeURIComponent(newHtml)); } catch (e) { }
                            });
                        }
                    });
                },
                init_instance_callback: function (editor) {
                    editor.setContent(initialContent || '');
                }
            });

            // 3. Hiển thị qua Bootstrap
            const modalEl = document.getElementById(modalId);
            modalEl.addEventListener('show.bs.modal', function () {
                setTimeout(() => { // Tăng z-index phông nền đen tương ứng với Modal mới
                    const backdrops = document.querySelectorAll('.modal-backdrop');
                    const lastBd = backdrops[backdrops.length - 1];
                    if (lastBd) lastBd.style.zIndex = zIndexClass - 2;
                }, 10);
            });
            const popupModal = new bootstrap.Modal(modalEl, { backdrop: 'static' });
            popupModal.show();
        };

        window.savePopupModal = function (modalId, editorId) {
            const content = tinymce.get(editorId).getContent();
            const cb = window['cb_' + editorId];
            if (cb) cb(content);
            closePopupModal(modalId, editorId);
        };

        window.closePopupModal = function (modalId, editorId) {
            const modalEl = document.getElementById(modalId);
            const popupModal = bootstrap.Modal.getInstance(modalEl);
            popupModal.hide();

            // Xóa sạch dấu tích DOM để giải phóng bộ nhớ
            setTimeout(() => {
                tinymce.get(editorId).remove();
                modalEl.remove();
                delete window['cb_' + editorId];
                popupDepth--;
            }, 300);
        };

        function initTinyMCE() {
            tinymce.init({
                selector: '#my-editor',
                base_url: './tinymce', // Chỉ đường dẫn tới folder tinymce offline trong cùng phân vùng
                suffix: '.min',
                license_key: 'gpl',
                promotion: false,
                branding: false,
                height: '80vh',
                // Load các tính năng công cụ đầy đủ như Word
                plugins: 'lists link image media table code preview searchreplace visualblocks wordcount fullscreen charmap emoticons',
                toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline | forecolor backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | table image media link createpopup createaccordion | code preview fullscreen',
                menubar: 'file edit view insert format tools table',
                content_style: `
                    body { font-family: -apple-system, system-ui, sans-serif; font-size: 15px; margin: 20px; }
                    img { max-width: 100%; height: auto; }
                    .accordion { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: #fff; }
                    .accordion-item { border-bottom: 1px solid #e5e7eb; }
                    .accordion-header { background: #f8fafc; margin: 0; padding: 0; }
                    .accordion-button { display: block; width: 100%; border: none; background: transparent; padding: 16px 20px; text-align: left; font-weight: bold; color: #0d6efd; font-size: 16px; cursor: pointer; text-decoration: none; }
                    .accordion-button:hover { background: #f1f5f9; }
                    .accordion-collapse { display: block !important; padding: 16px 20px; background: #fff; border-top: 1px solid #e5e7eb; color: #4b5563; }
                `,
                setup: function (editor) {
                    // PLUGIN: Create Accordion
                    editor.ui.registry.addButton('createaccordion', {
                        icon: 'chevron-down',
                        tooltip: 'Chèn Accordion (Mở/Thu gọn)',
                        onAction: () => {
                            const uniqueId = 'accordion-' + Date.now();
                            const item1Id = 'heading-' + Date.now() + '-1';
                            const collapse1Id = 'collapse-' + Date.now() + '-1';

                            const html = `
                                <div class="accordion rounded-3 shadow-sm mb-4 border" id="${uniqueId}">
                                  <div class="accordion-item border-0">
                                    <h2 class="accordion-header m-0" id="${item1Id}">
                                      <button class="accordion-button bg-light fw-bold text-primary p-3 w-100 text-start collapsed" style="border: none;" type="button" data-bs-toggle="collapse" data-bs-target="#${collapse1Id}" aria-expanded="false" aria-controls="${collapse1Id}">
                                        <span style="margin-right: 8px; font-size: 18px;"></span> Tiêu đề mục 1 (Bấm vào tôi)
                                      </button>
                                    </h2>
                                    <div id="${collapse1Id}" class="accordion-collapse collapse border-top" aria-labelledby="${item1Id}" data-bs-parent="#${uniqueId}">
                                      <div class="accordion-body p-3">
                                        <p class="text-muted m-0">Nhập nội dung chi tiết vào đây...</p>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                                <p>&nbsp;</p>
                            `;
                            editor.insertContent(html);
                        }
                    });

                    // PLUGIN: Create Popup
                    editor.ui.registry.addButton('createpopup', {
                        icon: 'comment',
                        tooltip: 'Tạo Popup (Bôi đen text)',
                        onAction: () => {
                            const selectedText = editor.selection.getContent({ format: 'text' });
                            if (!selectedText) {
                                showNotification('Vui lòng bôi đen text cần tạo popup!', 'warning');
                                return;
                            }

                            if (window.launchPopupEditor) {
                                window.launchPopupEditor('', (popupHtml) => {
                                    if (!editor) return;
                                    editor.focus();
                                    try {
                                        const safeVal = encodeURIComponent(popupHtml);
                                        const html = `<span class="custom-popup" data-popup-content="${safeVal}" title="Click xem chi tiết" style="color: blue; text-decoration: underline; cursor: pointer;">${selectedText}</span>`;
                                        editor.insertContent(html);
                                    } catch (e) {
                                        showNotification("Lỗi tạo popup: " + e.message, 'danger');
                                    }
                                });
                            }
                        }
                    });

                    // Edit existing popup on click
                    editor.on('click', (e) => {
                        const target = e.target;
                        if (target.nodeName === 'SPAN' && target.classList.contains('custom-popup')) {
                            const oldVal = target.getAttribute('data-popup-content') || '';
                            if (window.launchPopupEditor) {
                                try {
                                    var decoded = decodeURIComponent(oldVal);
                                } catch (e) { var decoded = oldVal; }
                                window.launchPopupEditor(decoded, (newHtml) => {
                                    editor.focus();
                                    try {
                                        editor.dom.setAttrib(target, 'data-popup-content', encodeURIComponent(newHtml));
                                    } catch (e) {
                                        showNotification("Lỗi sửa popup: " + e.message, 'danger');
                                    }
                                });
                            }
                        }
                    });
                },
                // Cấu hình lưu trữ ảnh dưới dạng base64 code trực tiếp (không cần link ảnh mạng ngoài)
                automatic_uploads: false,
                images_upload_handler: function (blobInfo, success, failure) {
                    success('data:' + blobInfo.blob().type + ';base64,' + blobInfo.base64());
                }
            });
        }

        window.onload = () => {
            initTinyMCE();
        };

        // Khi nhấn nút Tạo mới
        function createNew() {
            showConfirm("Tạo mới sẽ xóa toàn bộ nội dung hiện tại trên màn hình (nếu chưa Lưu thì sẽ mất). Bạn chắc chắn chứ?", function () {
                tinymce.get('my-editor').setContent("");
                currentFileName = "web_moi_cua_ban.html";
                originalHead = `
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang HTML Mới</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; line-height: 1.6; }
    </style>`;
                document.getElementById('file-name-display').innerText = "Trạng thái: Trang trắng mới";
                showNotification("Đã khởi tạo trang trắng mới.");
            });
        }

        // Logic Import file từ máy tính
        document.getElementById('import-btn').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                const content = evt.target.result;

                // Mổ xẻ file HTML ra thành các khối <head> và <body>
                const parser = new DOMParser();
                const doc = parser.parseFromString(content, 'text/html');

                // 1. Trích xuất phần head (bao gồm các link stylesheet, script, meta...)
                originalHead = doc.head.innerHTML;

                // 2. Trích xuất body 
                const bodyContent = doc.body.innerHTML;

                // 3. Ném body vào khung soạn thảo Editor
                tinymce.get('my-editor').setContent(bodyContent);

                // 4. Update UI hiển thị tên file
                currentFileName = file.name;
                document.getElementById('file-name-display').innerText = "Đang sửa file: " + file.name;
                showNotification("Nhập file " + file.name + " thành công!");

                // Reset cái input để click vào cùng file cũ vẫn load lại
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // Logic Xuất File (bọc body đang làm vào head cũ và sinh link download)
        function exportHTML() {
            const editorContent = tinymce.get('my-editor').getContent(); // Lấy mã HTML người dùng đã sửa ở Editor

            // Nhúng CSS và JS để Accordion luôn chạy và đẹp mọi nơi (offline mode)
            const accordionFix = `
<style>
  .accordion { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); background: #fff; }
  .accordion-item { border-bottom: 1px solid #e5e7eb; }
  .accordion-item:last-child { border-bottom: none; }
  .accordion-header { background: #f8fafc; margin: 0; padding: 0; }
  .accordion-button { display: block; width: 100%; border: none; background: transparent; padding: 16px 20px; text-align: left; font-weight: bold; color: #0d6efd; font-size: 16px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
  .accordion-button:hover { background: #f1f5f9; }
  .accordion-collapse { display: none; padding: 16px 20px; background: #fff; border-top: 1px solid #e5e7eb; color: #4b5563; }
  .accordion-collapse.show { display: block; }
  /* Override Bootstrap classes if they existed but styles didn't load */
  .m-0 { margin: 0 !important; }
  .p-3 { padding: 1rem !important; }
  .w-100 { width: 100% !important; }
  .text-start { text-align: left !important; }
  .text-primary { color: #0d6efd !important; }
  .text-muted { color: #6c757d !important; }
  .fw-bold { font-weight: bold !important; }
  .bg-light { background-color: #f8f9fa !important; }
</style>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    function openAccordionByHash() {
      if (window.location.hash) {
        try {
          const hashTarget = document.querySelector(window.location.hash);
          if (hashTarget) {
            const collapse = hashTarget.classList.contains('accordion-collapse') ? hashTarget : hashTarget.closest('.accordion-collapse');
            if (collapse && !collapse.classList.contains('show')) {
              if (typeof bootstrap !== 'undefined' && bootstrap.Collapse) {
                new bootstrap.Collapse(collapse, {toggle: false}).show();
              } else {
                collapse.classList.add('show');
                const btn = document.querySelector('[data-bs-target="#' + collapse.id + '"]');
                if (btn) {
                  btn.setAttribute('aria-expanded', 'true');
                  btn.classList.remove('collapsed');
                }
              }
              setTimeout(() => hashTarget.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
            }
          }
        } catch (e) {}
      }
    }
    openAccordionByHash();
    window.addEventListener('hashchange', openAccordionByHash);

    if (typeof bootstrap === 'undefined') {
      document.querySelectorAll('.accordion-button').forEach(btn => {
        btn.addEventListener('click', function() {
          const targetId = this.getAttribute('data-bs-target');
          const target = document.querySelector(targetId);
          if(target) {
            const parent = this.closest('.accordion');
            if(parent) {
              parent.querySelectorAll('.accordion-collapse.show').forEach(el => {
                if(el !== target) {
                  el.classList.remove('show');
                  const otherBtn = document.querySelector('[data-bs-target="#' + el.id + '"]');
                  if(otherBtn) {
                     otherBtn.setAttribute('aria-expanded', 'false');
                     otherBtn.classList.add('collapsed');
                  }
                }
              });
            }
            const isShow = target.classList.toggle('show');
            this.setAttribute('aria-expanded', isShow ? 'true' : 'false');
            if(isShow) this.classList.remove('collapsed'); else this.classList.add('collapsed');
          }
        });
      });
    }
  });
<\/script>
`;

            // Lắp ráp lại thành 1 file Web chuần chỉ
            const finalHtml = `<!DOCTYPE html>
<html lang="vi">
<head>
${originalHead}
</head>
<body>
${editorContent}
${editorContent.includes('class="accordion') ? accordionFix : ''}
</body>
</html>`;

            // Cơ chế tạo file ảo và tải về bằng js
            const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification("File " + currentFileName + " đã được tạo và tải về máy thành công!");
        }
    </script>
</body>

</html>
